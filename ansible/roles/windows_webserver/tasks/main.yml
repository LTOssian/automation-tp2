---
# Windows timezone stub
# A real Windows VM could not be provisioned due to ARM (Apple Silicon) +
# storage constraints (11 GB free vs ~20 GB required).
# This stub documents the intended workflow and fails gracefully.
#
# On a real Windows node with WinRM enabled, these tasks would run:
#
#   - name: Set timezone to Europe/Paris
#     community.windows.win_timezone:
#       timezone: "Romance Standard Time"
#
#   - name: Verify timezone
#     ansible.windows.win_shell: (Get-TimeZone).Id
#     register: tz_result
#
#   - name: Set timezone to Africa/Abidjan (GMT Standard Time)
#     community.windows.win_timezone:
#       timezone: "GMT Standard Time"
#
# To enable: set WINDOWS_HOST in GitHub Actions variables and ensure
# WinRM is configured on the target (see docs/02-runner-setup.md).

- name: Windows node skipped — ARM/storage limitation documented
  ansible.builtin.debug:
    msg: >
      Windows VM provisioning was skipped on this host.
      Reason: Apple Silicon (ARM64) Mac with insufficient disk space (~11 GB free,
      Windows Server requires ~20 GB minimum).
      The WinRM configuration and timezone automation code is documented in
      ansible/roles/windows_webserver/ and would execute on a reachable Windows node.
