---
# Timezone management role
# Sets timezone to Europe/Paris, verifies, then switches to Africa/Abidjan (GMT).
# Uses direct /etc/timezone + /etc/localtime manipulation to work inside Docker
# containers where hwclock/timedatectl may not be available.

- name: Set timezone to Europe/Paris
  block:
    - name: Write /etc/timezone (Europe/Paris)
      ansible.builtin.copy:
        content: "Europe/Paris\n"
        dest: /etc/timezone
      become: true

    - name: Link /etc/localtime to Europe/Paris zoneinfo
      ansible.builtin.file:
        src: /usr/share/zoneinfo/Europe/Paris
        dest: /etc/localtime
        state: link
        force: true
      become: true

- name: Verify timezone is Europe/Paris
  ansible.builtin.command: cat /etc/timezone
  register: tz_paris
  changed_when: false

- name: Assert timezone is Europe/Paris
  ansible.builtin.assert:
    that: tz_paris.stdout | trim == "Europe/Paris"
    fail_msg: "Timezone was NOT set to Europe/Paris (got: {{ tz_paris.stdout }})"
    success_msg: "Timezone confirmed: {{ tz_paris.stdout | trim }}"

- name: Switch timezone to Africa/Abidjan (GMT)
  block:
    - name: Write /etc/timezone (Africa/Abidjan)
      ansible.builtin.copy:
        content: "Africa/Abidjan\n"
        dest: /etc/timezone
      become: true

    - name: Link /etc/localtime to Africa/Abidjan zoneinfo
      ansible.builtin.file:
        src: /usr/share/zoneinfo/Africa/Abidjan
        dest: /etc/localtime
        state: link
        force: true
      become: true

- name: Verify timezone is Africa/Abidjan
  ansible.builtin.command: cat /etc/timezone
  register: tz_abidjan
  changed_when: false

- name: Assert timezone is Africa/Abidjan
  ansible.builtin.assert:
    that: tz_abidjan.stdout | trim == "Africa/Abidjan"
    fail_msg: "Timezone was NOT set to Africa/Abidjan (got: {{ tz_abidjan.stdout }})"
    success_msg: "Timezone confirmed: {{ tz_abidjan.stdout | trim }}"

- name: Display final timezone
  ansible.builtin.debug:
    msg: "Final timezone on {{ inventory_hostname }}: {{ tz_abidjan.stdout | trim }}"
