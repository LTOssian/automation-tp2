<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevOps TP2 – EFREI M1-DEV1 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 2.5rem 3rem;
      max-width: 560px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .badge {
      display: inline-block;
      background: #22c55e;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      margin-bottom: 1.25rem;
    }
    h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .subtitle { color: #94a3b8; font-size: 0.95rem; margin-bottom: 2rem; }
    .stack { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .pill {
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 6px;
      padding: 0.4rem 0.9rem;
      font-size: 0.85rem;
      color: #7dd3fc;
    }
    footer { margin-top: 2rem; color: #475569; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">DEPLOYED</span>
    <h1>DevOps TP2</h1>
    <p class="subtitle">EFREI &mdash; M1-DEV1 2026 &mdash; Infrastructure &amp; Automation</p>
    <div class="stack">
      <span class="pill">Terraform</span>
      <span class="pill">Ansible</span>
      <span class="pill">nginx</span>
      <span class="pill">GitLab CI/CD</span>
    </div>
    <footer>Served by nginx &bull; Provisioned with Ansible &bull; Inventory generated by Terraform</footer>
  </div>
</body>
</html>
