---
# Ansible site entry-point
# Run: ansible-playbook -i inventory.ini site.yml

# ---------------------------------------------------------------------------
- name: Gather facts on Ansible Controller (localhost)
  hosts: localhost
  connection: local
  gather_facts: true
  tasks:
    - name: Display controller facts
      ansible.builtin.debug:
        msg: >
          Controller OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          | Hostname: {{ ansible_hostname }}
          | IPv4: {{ ansible_default_ipv4.address | default('N/A') }}

# ---------------------------------------------------------------------------
- name: Deploy nginx + HTML page on Linux web servers
  hosts: webservers
  become: true
  roles:
    - nginx

# ---------------------------------------------------------------------------
- name: Timezone management on Linux nodes (Europe/Paris → Africa/Abidjan)
  hosts: webservers
  become: true
  roles:
    - timezone

# ---------------------------------------------------------------------------
- name: Configure nginx load balancer
  hosts: loadbalancer
  become: true
  roles:
    - loadbalancer

# ---------------------------------------------------------------------------
- name: Windows node management (WinRM — stubbed, see role for details)
  hosts: windows
  gather_facts: false
  ignore_unreachable: true
  roles:
    - windows_webserver
