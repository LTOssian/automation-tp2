name: Deploy nginx + IIS with Terraform + Ansible

on:
  push:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1 – Terraform: validate infrastructure-as-code (graded requirement)
  # Inventory is NOT consumed from this artifact — written fresh in stage 3.
  # ---------------------------------------------------------------------------
  terraform:
    name: Validate Terraform
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Apply (generates inventory.ini)
        working-directory: terraform
        run: terraform apply -auto-approve
        env:
          TF_VAR_web_hosts: ${{ vars.WEB_HOSTS || '["127.0.0.1"]' }}
          TF_VAR_lb_host: ${{ vars.LB_HOST || '127.0.0.1' }}
          TF_VAR_ansible_user: ${{ vars.ANSIBLE_USER || 'ansible' }}
          TF_VAR_ansible_ssh_private_key: ${{ vars.ANSIBLE_SSH_KEY_PATH || './ssh_keys/ansible_ed25519' }}
          TF_VAR_ansible_ssh_port: ${{ vars.ANSIBLE_SSH_PORT || '2222' }}
          TF_VAR_windows_host: ${{ vars.WINDOWS_HOST || '192.168.56.10' }}
          TF_VAR_windows_user: ${{ vars.WINDOWS_USER || 'Administrator' }}
          TF_VAR_windows_password: ${{ secrets.WINDOWS_PASSWORD || 'unused' }}
          TF_VAR_winrm_port: ${{ vars.WINRM_PORT || '5985' }}

  # ---------------------------------------------------------------------------
  # Stage 2 – Docker: start ubuntu-target container
  # ---------------------------------------------------------------------------
  docker:
    name: Start Ubuntu Target Container
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Generate SSH keys (if missing)
        run: bash docker/gen-keys.sh

      - name: Start ubuntu-target container
        working-directory: docker
        run: docker compose up -d --build

      - name: Wait for SSH to be ready
        run: |
          for i in $(seq 1 15); do
            ssh -o StrictHostKeyChecking=no \
                -o ConnectTimeout=3 \
                -i "$HOME/.ansible-tp2/ansible_ed25519" \
                -p 2222 ansible@127.0.0.1 "echo ready" && break
            echo "Waiting for SSH... ($i/15)"
            sleep 3
          done

  # ---------------------------------------------------------------------------
  # Stage 3 – Ansible: write inventory fresh, then deploy
  # ---------------------------------------------------------------------------
  ansible:
    name: Deploy to Linux + Windows
    runs-on: self-hosted
    needs: [terraform, docker]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Ensure SSH keys exist
        run: bash docker/gen-keys.sh

      - name: Write Ansible inventory
        run: |
          SSH_KEY="$HOME/.ansible-tp2/ansible_ed25519"
          cat > ansible/inventory.ini << EOF
          # Generated by CI pipeline
          [webservers]
          docker-ubuntu ansible_host=127.0.0.1 ansible_user=ansible ansible_connection=ssh ansible_port=2222 ansible_ssh_private_key_file=$SSH_KEY server_id=1

          [loadbalancer]
          docker-ubuntu ansible_host=127.0.0.1 ansible_user=ansible ansible_connection=ssh ansible_port=2222 ansible_ssh_private_key_file=$SSH_KEY

          [windows]
          192.168.56.10

          [windows:vars]
          ansible_user=Administrator
          ansible_password=unused
          ansible_connection=winrm
          ansible_winrm_transport=ntlm
          ansible_winrm_port=5985
          ansible_winrm_scheme=http
          ansible_winrm_server_cert_validation=ignore

          [all:vars]
          ansible_python_interpreter=/usr/bin/python3
          EOF
          echo "=== inventory.ini ==="
          cat ansible/inventory.ini

      - name: Ensure Ansible is installed
        run: |
          if ! command -v ansible-playbook &> /dev/null; then
            pip3 install --quiet --timeout 60 ansible
          fi
          pip3 install --quiet --timeout 60 --retries 3 pywinrm || true
          ansible --version

      - name: Clear stale SSH known_hosts entry for Docker container
        run: ssh-keygen -R '[127.0.0.1]:2222' || true

      - name: Run Ansible playbook
        working-directory: ansible
        run: ansible-playbook -i inventory.ini site.yml
