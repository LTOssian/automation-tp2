name: Deploy nginx + IIS with Terraform + Ansible

on:
  push:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1 – Terraform: generate Ansible inventory
  # ---------------------------------------------------------------------------
  terraform:
    name: Generate Ansible Inventory
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve
        env:
          TF_VAR_web_hosts: ${{ vars.WEB_HOSTS || '["127.0.0.1"]' }}
          TF_VAR_lb_host: ${{ vars.LB_HOST || '127.0.0.1' }}
          TF_VAR_ansible_user: ${{ vars.ANSIBLE_USER || 'ansible' }}
          TF_VAR_ansible_ssh_private_key: ${{ vars.ANSIBLE_SSH_KEY_PATH || './ssh_keys/ansible_ed25519' }}
          TF_VAR_ansible_ssh_port: ${{ vars.ANSIBLE_SSH_PORT || '2222' }}
          TF_VAR_windows_host: ${{ vars.WINDOWS_HOST || '192.168.56.10' }}
          TF_VAR_windows_user: ${{ vars.WINDOWS_USER || 'Administrator' }}
          TF_VAR_windows_password: ${{ secrets.WINDOWS_PASSWORD }}
          TF_VAR_winrm_port: ${{ vars.WINRM_PORT || '5985' }}

      - name: Upload inventory artifact
        uses: actions/upload-artifact@v4
        with:
          name: ansible-inventory
          path: ansible/inventory.ini

  # ---------------------------------------------------------------------------
  # Stage 2 – Docker: start ubuntu-target container
  # ---------------------------------------------------------------------------
  docker:
    name: Start Ubuntu Target Container
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Generate SSH keys (if missing)
        run: bash docker/gen-keys.sh

      - name: Start ubuntu-target container
        working-directory: docker
        run: docker compose up -d --build

      - name: Wait for SSH to be ready
        run: |
          for i in $(seq 1 15); do
            ssh -o StrictHostKeyChecking=no \
                -o ConnectTimeout=3 \
                -i ansible/ssh_keys/ansible_ed25519 \
                -p 2222 ansible@127.0.0.1 "echo ready" && break
            echo "Waiting for SSH... ($i/15)"
            sleep 3
          done

  # ---------------------------------------------------------------------------
  # Stage 3 – Ansible: deploy to all targets
  # ---------------------------------------------------------------------------
  ansible:
    name: Deploy to Linux + Windows
    runs-on: self-hosted
    needs: [terraform, docker]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Download inventory artifact
        uses: actions/download-artifact@v4
        with:
          name: ansible-inventory
          path: ansible/

      - name: Ensure Ansible + WinRM deps are installed
        run: |
          if ! command -v ansible-playbook &> /dev/null; then
            pip3 install --quiet --timeout 60 ansible
          fi
          pip3 install --quiet --timeout 60 --retries 3 pywinrm || true
          ansible --version

      - name: Run Ansible playbook
        working-directory: ansible
        run: ansible-playbook -i inventory.ini site.yml
